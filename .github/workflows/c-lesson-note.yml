name: C Lesson Break Note

on:
  schedule:
    # Avoid the busiest minute boundaries on GitHub-hosted runners.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/c-lesson-note.yml"
      - "scripts/**"

permissions:
  contents: write

jobs:
  generate-note:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation
        uses: actions/checkout@v4
        with:
          path: automation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install requests

      - name: Find latest updated public repository
        id: source
        env:
          SOURCE_GITHUB_OWNER: 4rah1120-commits
          AUTOMATION_REPOSITORY: ${{ github.repository }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: python automation/scripts/select_latest_public_repo.py

      - name: Checkout latest class repository
        if: steps.source.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ steps.source.outputs.branch }}
          path: current
          fetch-depth: 2

      - name: Checkout reference student code
        if: steps.source.outputs.changed == 'true'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: woojaeoh/Physical_AI_C_language
          path: refs/student

      - name: Checkout instructor code
        if: steps.source.outputs.changed == 'true'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: heartha21/class_c_202607
          ref: master
          path: refs/instructor

      - name: Generate and upload Notion note
        if: steps.source.outputs.changed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          GITHUB_REPOSITORY: ${{ steps.source.outputs.repository }}
          GITHUB_SHA: ${{ steps.source.outputs.sha }}
          GITHUB_REF_NAME: ${{ steps.source.outputs.branch }}
        run: python automation/scripts/generate_lesson_note.py

      - name: Save processed commit
        if: steps.source.outputs.changed == 'true'
        env:
          SOURCE_REPOSITORY: ${{ steps.source.outputs.repository }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          python automation/scripts/select_latest_public_repo.py --save
          git -C automation config user.name "github-actions[bot]"
          git -C automation config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C automation add automation-state.json
          git -C automation commit -m "Record processed public repository commit"
          git -C automation push

      - name: Upload generated markdown
        if: steps.source.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: c-lesson-note
          path: current/generated-notes/*.md
